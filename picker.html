<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; color: #333;
           padding: 20px; min-width: 380px; }
    h3 { margin: 0 0 12px; font-size: 14px; color: #1a237e; }
    p  { margin: 0 0 10px; color: #555; font-size: 12px; }
    input[type="file"] { display: block; margin: 0 0 12px; font-size: 12px; }
    #status { font-size: 12px; color: #555; min-height: 16px; }
    #status.error { color: #c62828; }
    #status.ok    { color: #2e7d32; }
  </style>
</head>
<body>
  <h3>Pick a local PDF</h3>
  <p>Select a PDF file — conversion starts immediately.</p>
  <input type="file" id="pdfFile" accept=".pdf,application/pdf"/>
  <div id="status"></div>
  <script src="picker.js"></script>
</body>
</html>
