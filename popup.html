<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h3 {
      margin: 0 0 14px 0;
      font-size: 15px;
      color: #1a237e;
    }
    .section {
      margin-bottom: 11px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: bold;
      color: #888;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #2196F3;
    }
    .key-row {
      display: flex;
      gap: 6px;
    }
    .key-row input {
      flex: 1;
    }
    button {
      padding: 6px 12px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #saveKey {
      background: #e0e0e0;
      color: #333;
      white-space: nowrap;
    }
    #saveKey:hover { background: #bdbdbd; }
    #convertBtn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      background: #1565C0;
      color: white;
      border-radius: 4px;
      margin-top: 4px;
    }
    #convertBtn:hover:not(:disabled) { background: #0d47a1; }
    #convertBtn:disabled { background: #9e9e9e; cursor: not-allowed; }
    #keyStatus {
      font-size: 11px;
      color: #4CAF50;
      min-height: 14px;
      margin-top: 2px;
    }
    #status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }
    #status.error { color: #c62828; }
    #status.ok { color: #2e7d32; }
    .progress-bar {
      height: 3px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%;
      background: #2196F3;
      border-radius: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .or-divider {
      text-align: center;
      color: #bbb;
      font-size: 11px;
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .file-row { display: flex; align-items: center; gap: 8px; }
    #pickFile { background: #e0e0e0; color: #333; white-space: nowrap; flex-shrink: 0; }
    #pickFile:hover { background: #bdbdbd; }
    .file-name { font-size: 11px; color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <h3>PDF → ePub Converter</h3>

  <div class="section">
    <label>Mistral API Key</label>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="sk-..."/>
      <button id="saveKey">Save</button>
    </div>
    <div id="keyStatus"></div>
  </div>

  <div class="section">
    <label>PDF URL</label>
    <input type="text" id="pdfUrl" placeholder="https://example.com/paper.pdf"/>
  </div>

  <div class="or-divider">or</div>

  <div class="section">
    <label>Local PDF File</label>
    <div class="file-row">
      <input type="file" id="pdfFile" accept=".pdf,application/pdf" style="display:none"/>
      <button id="pickFile">Browse…</button>
      <span id="fileName" class="file-name">No file chosen</span>
    </div>
  </div>

  <div class="section">
    <label>Title</label>
    <input type="text" id="docTitle" placeholder="Document title"/>
  </div>

  <button id="convertBtn">Convert PDF to ePub</button>
  <div class="progress-bar" id="progressBar"><div class="progress-fill"></div></div>
  <div id="status"></div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
